<!DOCTYPE html>
<html>
<head>
    <style>
        .logout-btn {
            position: fixed;
            top: 15px;
            right: 20px;
            padding: 10px 18px;
            background: linear-gradient(45deg, #ff4d4d, #ff0000);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
            z-index: 1000;
        }

        .logout-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<a href="{% url 'logout' %}" class="logout-btn">🚪 Logout</a>

</body>
</html>
