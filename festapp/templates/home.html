<!DOCTYPE html>
<html>
<head>
    <title>AIKYATH 2026</title>

    {% load static %}

    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: Arial, sans-serif;

            background: url("{% static 'images/background.jpg' %}") no-repeat center center fixed;
            background-size: cover;

            margin: 0;
            text-align: center;
        }

        /* 🔥 LIGHT OVERLAY */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.15);
            z-index: -1;
        }

        /* 🔥 STICKY HEADER */
        .header {
            position: sticky;
            top: 0;
            z-index: 999;

            padding: 15px 0;

            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);

            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        /* 🔥 TITLE */
        h1 {
            margin: 0;
            font-size: 40px;

            background: linear-gradient(45deg, #ffffff, #feca57, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        h3 {
            color: #eee;
            margin-top: 5px;
        }

        /* 🔥 MENU BUTTON */
        .menu-btn {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;

            background: #feca57;
            color: black;
            font-weight: bold;

            transition: 0.3s;
        }

        .menu-btn:hover {
            background: #ff9f43;
        }

        /* 🔥 GRID */
        .container {
            display: none; /* initially hidden */
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            padding: 40px;
        }

        /* 🔥 CARD */
        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);

            border-radius: 20px;
            padding: 30px;
            font-size: 18px;
            font-weight: bold;
            color: white;

            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);

            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
            background: rgba(255,255,255,0.15);
            box-shadow: 0 12px 35px rgba(0,0,0,0.4);
        }

        a {
            text-decoration: none;
            color: inherit;
        }

    </style>
</head>

<body>

    {% include 'logout.html' %}

    <!-- 🔥 HEADER -->
    <div class="header">
        <h1>AIKYATH 2026 🎉</h1>
        <h3>Main Menu</h3>

        <button onclick="toggleMenu()" class="menu-btn">☰ Menu</button>
    </div>

    <!-- 🔥 CARDS -->
    <div class="container" id="menuContainer">

        <a href="{% url 'budget' %}"><div class="card">Budget</div></a>
        <a href="{% url 'food' %}"><div class="card">Food</div></a>
        <a href="{% url 'soundstage' %}"><div class="card">Sound & Stage</div></a>
        <a href="{% url 'photography' %}"><div class="card">Photography</div></a>
        <a href="{% url 'decoration' %}"><div class="card">Decoration</div></a>
        <a href="{% url 'tech' %}"><div class="card">Tech</div></a>
        <a href="{% url 'nontech' %}"><div class="card">Non-Tech</div></a>
        <a href="{% url 'discipline' %}"><div class="card">Discipline</div></a>
        <a href="{% url 'gifts' %}"><div class="card">Gifts</div></a>

    </div>

    <!-- 🔥 SCRIPT -->
    <script>
        function toggleMenu() {
            var menu = document.getElementById("menuContainer");

            if (menu.style.display === "none" || menu.style.display === "") {
                menu.style.display = "grid";
            } else {
                menu.style.display = "none";
            }
        }
    </script>

</body>
</html>
