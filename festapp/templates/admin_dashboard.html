<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 30%, #f093fb 70%, #f5576c 100%);
    padding: 20px;
    min-height: 100vh;
}

.dashboard-container {
    max-width: 1300px;
    margin: auto;
    background: rgba(255,255,255,0.97);
    border-radius: 25px;
    overflow: hidden;
    box-shadow: 0 25px 60px rgba(0,0,0,0.2);
    backdrop-filter: blur(15px);
}

.header {
    background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1);
    color: white;
    padding: 25px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
}

.header::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 20"><defs><pattern id="grain" width="100" height="20" patternUnits="userSpaceOnUse"><circle cx="5" cy="5" r="1" fill="rgba(255,255,255,0.1)"/><circle cx="25" cy="15" r="0.5" fill="rgba(255,255,255,0.05)"/><circle cx="75" cy="8" r="0.8" fill="rgba(255,255,255,0.1)"/></pattern></defs><rect width="100%" height="100%" fill="url(%23grain)"/></svg>');
}

h2 {
    font-size: 2.2em;
    font-weight: 700;
    margin: 0;
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
}

.logout-btn {
    background: linear-gradient(45deg, rgba(255,255,255,0.3), rgba(255,255,255,0.1));
    padding: 12px 25px;
    border-radius: 30px;
    color: white;
    text-decoration: none;
    font-weight: 600;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
}

.logout-btn:hover {
    background: linear-gradient(45deg, rgba(255,255,255,0.4), rgba(255,255,255,0.2));
    transform: translateY(-3px);
    box-shadow: 0 15px 30px rgba(0,0,0,0.2);
}

.table-container {
    padding: 30px;
}

table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    background: white;
}

th {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 18px 20px;
    text-align: left;
    font-weight: 600;
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 1px;
    position: relative;
}

th::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #ff6b6b, #4ecdc4);
}

td {
    padding: 18px 20px;
    border-bottom: 1px solid rgba(102, 126, 234, 0.1);
    transition: all 0.3s ease;
    position: relative;
}

tr {
    transition: all 0.3s ease;
}

tr:hover {
    background: linear-gradient(90deg, #f0f8ff 0%, #fff0f5 100%);
    transform: scale(1.02);
    box-shadow: 0 10px 30px rgba(102, 126, 234, 0.15);
}

tr:first-child {
    background: linear-gradient(90deg, #e6ffe6 0%, #d4f4d4 100%) !important;
    border: 2px solid #4ecdc4;
    box-shadow: 0 5px 20px rgba(78, 205, 196, 0.3);
    font-weight: 600;
    position: relative;
}

tr:first-child::after {

    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    background: #ff6b6b;
    color: white;
    padding: 4px 12px;
    border-radius: 15px;
    font-size: 12px;
    font-weight: bold;
}

.serial-no {
    font-weight: 700;
    color: #4a5568;
    font-size: 18px;
    background: linear-gradient(45deg, #ff9ff3, #f368e0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.name-cell {
    font-weight: 600;
    color: #2d3748;
}

.section-badge {
    background: linear-gradient(45deg, #4ecdc4, #44a08d);
    color: white;
    padding: 8px 16px;
    border-radius: 25px;
    font-size: 14px;
    font-weight: 500;
    box-shadow: 0 4px 15px rgba(78, 205, 196, 0.3);
    display: inline-block;
}

.password-display {
    font-family: 'Courier New', monospace;
    color: #718096;
    font-size: 15px;
    background: linear-gradient(90deg, #f7fafc, #edf2f7);
    padding: 8px 12px;
    border-radius: 8px;
    display: inline-block;
    min-width: 120px;
}

.toggle-pass {
    cursor: pointer;
    border: none;
    background: linear-gradient(45deg, #667eea, #764ba2);
    color: white;
    padding: 8px 12px;
    border-radius: 50%;
    font-size: 16px;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
    margin-left: 10px;
}

.toggle-pass:hover {
    transform: scale(1.2) rotate(180deg);
    box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
}

.delete-btn {
    background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
    color: white;
    padding: 10px 20px;
    border-radius: 25px;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    transition: all 0.3s ease;
    display: inline-block;
    box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
    border: none;
    cursor: pointer;
}

.delete-btn:hover {
    background: linear-gradient(45deg, #ff5252, #ff6b6b);
    transform: translateY(-3px);
    box-shadow: 0 12px 30px rgba(255, 107, 107, 0.4);
}

.time-cell {
    color: #718096;
    font-family: 'Courier New', monospace;
    font-size: 14px;
}

.no-data {
    text-align: center;
    padding: 60px 20px;
    color: #a0aec0;
    font-size: 24px;
    background: linear-gradient(45deg, #ffd89b, #feca57);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

@media (max-width: 768px) {
    .header {
        flex-direction: column;
        gap: 20px;
        text-align: center;
    }
    
    th, td {
        padding: 12px 10px;
        font-size: 14px;
    }
    
    tr:first-child::after {
        position: static;
        transform: none;
        margin-top: 10px;
        display: inline-block;
    }
}
</style>
</head>

<body>
<div class="dashboard-container">
    <div class="header">
        <h2>✨ Admin Dashboard</h2>
        <a href="/logout/" class="logout-btn">🚪 Logout</a>
    </div>

    <div class="table-container">
        {% if data %}
        <table>
            <tr>
                <th>#</th>
                <th>Name</th>
                <th>Section</th>
                <th>Password</th>
                <th>Login Time</th>
                <th>Action</th>
            </tr>

            {% for user in data %}
            <tr>
                <td class="serial-no">{{ forloop.counter }}</td>
                <td class="name-cell">{{ user.name }}</td>
                <td><span class="section-badge">{{ user.section }}</span></td>

                <td>
                    <span id="pass-{{ forloop.counter }}" class="password-display">********</span>
                    <button onclick="togglePassword('pass-{{ forloop.counter }}','{{ user.password }}')" class="toggle-pass" title="Toggle Password">👁️</button>
                </td>

                <td class="time-cell">{{ user.login_time }}</td>

                <td>
                    <a href="/delete/{{ user.id }}/" onclick="return confirm('Delete {{ user.name }}?')" class="delete-btn">
                        🗑️ Delete
                    </a>
                </td>
            </tr>
            {% endfor %}
        </table>
        {% else %}
        <div class="no-data">👥 No users found</div>
        {% endif %}
    </div>
</div>

<script>
function togglePassword(id, pass) {
    let el = document.getElementById(id);
    if (el.innerHTML === "********") {
        el.innerHTML = pass;
        el.style.background = 'linear-gradient(90deg, #ffeaa7, #fab1a0)';
        el.style.color = '#2d3436';
    } else {
        el.innerHTML = "********";
        el.style.background = 'linear-gradient(90deg, #f7fafc, #edf2f7)';
        el.style.color = '#718096';
    }
}
</script>
</body>
</html>
