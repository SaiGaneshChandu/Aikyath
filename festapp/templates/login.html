<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIKYATH Login</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: #333;
            position: relative;
            overflow: hidden;
        }
        
        /* 🔥 SCROLLING BANNER */
        .scroll-banner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px; /* Increased height for bigger text */
            background: linear-gradient(90deg, #ff6b6b, #feca57, #4ecdc4, #45b7d1, #ff6b6b);
            background-size: 400% 100%;
            animation: gradientShift 3s ease infinite, scrollText 20s linear infinite;
            display: flex;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-weight: bold;
            font-size: 32px; /* 🔥 DOUBLED from 16px */
            color: white;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.7); /* Stronger shadow for bigger text */
            overflow: hidden;
        }
        
        .scroll-text {
            white-space: nowrap;
            padding: 0 30px; /* More padding for bigger text */
            animation: scroll 25s linear infinite;
        }
        
        @keyframes scroll {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            min-width: 350px;
            margin-top: 80px; /* Adjusted for taller banner */
            z-index: 500;
        }
        h2 {
            text-align: center;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            font-size: 2em;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        input[type="text"], input[type="password"], select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            box-sizing: border-box;
            background: #f8f9fa;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }
        select {
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 107, 107, 0.4);
        }
        .form-group {
            margin-bottom: 20px;
        }

        /* 🔥 ERROR STYLE */
        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<!-- 🔥 SCROLLING BANNER -->
<div class="scroll-banner">
    <div class="scroll-text">
        🎉 AIKYATH 2K26 | Swarnandhra College of Engineering and Technology | Department of MCA and BCA 🎉
    </div>
</div>

<div class="login-container">
    <h2>Login</h2>

    <form method="POST" action="">
        {% csrf_token %}
        
        <div class="form-group">
            <label>Name:</label>
            <input type="text" name="name" required>
        </div>
        
        <div class="form-group">
            <label>Section:</label>
            <select name="section" required>
                <option value="">Select Section</option>
                <option value="Sr.MCA-A">Sr.MCA-A</option>
                <option value="Sr.MCA-B">Sr.MCA-B</option>
                <option value="Sr.MCA-C">Sr.MCA-C</option>
                <option value="Jr.MCA">Jr.MCA</option>
                <option value="Sr.BCA">Sr.BCA</option>
                <option value="Jr.BCA-A">Jr.BCA-A</option>
                <option value="Jr.BCA-B">Jr.BCA-B</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Password:</label>
            <input type="password" name="password" required>
        </div>
        
        <button type="submit">Login</button>
    </form>

    <!-- ✅ ERROR MESSAGE DISPLAY -->
    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

</div>

</body>
</html>
