<!DOCTYPE html>
<html lang="en">
<head>
    <title>Non-Tech Events</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }

        h2 {
            color: white;
            font-size: 2.5rem;
            margin: 30px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 22px;
            border-radius: 18px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: scale(1.05);
            background: #28a745; /* Green for non-tech */
            color: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .card a {
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: 600;
            color: inherit;
            display: block;
        }

        .home-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 28px;
            background: rgba(255,255,255,0.9);
            color: #333;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            border: 1px solid #ddd;
            transition: all 0.3s ease;
        }

        .home-btn:hover {
            background: #28a745;
            color: white;
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            h2 {
                font-size: 2rem;
            }
            .card-container {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <h2>🎯 Non-Tech Events</h2>

    <div class="card-container">
        <div class="card"><a href="/insta/">Insta Repost</a></div>
        <div class="card"><a href="/ludo/">Ludo</a></div>
        <div class="card"><a href="/chess/">Chess</a></div>
        <div class="card"><a href="/lucky/">Lucky Dip</a></div>
        <div class="card"><a href="/freefire/">Free Fire</a></div>
        <div class="card"><a href="/rangoli/">Rangoli</a></div>
        <div class="card"><a href="/volleyball/">Volley Ball</a></div>
    </div>

    <a href="/home/" class="home-btn">🏠 Home</a>
</body>
</html>
